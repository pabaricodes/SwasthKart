version: "3.9"

networks:
  swasthkart-net:
    driver: bridge

volumes:
  identity-db-data:
  catalog-db-data:
  inventory-db-data:
  cart-db-data:
  payment-db-data:
  order-db-data:
  delivery-db-data:
  redis-data:
  kafka-data:
  zookeeper-data:

services:
  # ─── Databases ───────────────────────────────────────────────

  identity-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: identity_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5501:5432"
    volumes:
      - identity-db-data:/var/lib/postgresql/data
    networks:
      - swasthkart-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  catalog-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: catalog_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5502:5432"
    volumes:
      - catalog-db-data:/var/lib/postgresql/data
    networks:
      - swasthkart-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  inventory-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5503:5432"
    volumes:
      - inventory-db-data:/var/lib/postgresql/data
    networks:
      - swasthkart-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  cart-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cart_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5504:5432"
    volumes:
      - cart-db-data:/var/lib/postgresql/data
    networks:
      - swasthkart-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  payment-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5505:5432"
    volumes:
      - payment-db-data:/var/lib/postgresql/data
    networks:
      - swasthkart-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  order-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5506:5432"
    volumes:
      - order-db-data:/var/lib/postgresql/data
    networks:
      - swasthkart-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  delivery-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: delivery_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5507:5432"
    volumes:
      - delivery-db-data:/var/lib/postgresql/data
    networks:
      - swasthkart-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - swasthkart-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Event Bus ───────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    networks:
      - swasthkart-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - swasthkart-net

  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    depends_on:
      - kafka
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
    networks:
      - swasthkart-net

  # ─── Kafka Topic Init ───────────────────────────────────────

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - kafka
    networks:
      - swasthkart-net
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      echo 'Waiting for Kafka to be ready...'
      cub kafka-ready -b kafka:29092 1 60
      echo 'Creating topics...'
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 --topic payment.succeeded
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 --topic order.placed
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 --topic order.handed-off
      echo 'Topics created.'
      "

  # ─── Application Services ───────────────────────────────────

  identity-service:
    build: ./services/identity-service
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@identity-db:5432/identity_db
      JWT_SECRET: dev-jwt-secret-change-in-production
      NODE_ENV: development
    depends_on:
      identity-db:
        condition: service_healthy
    networks:
      - swasthkart-net

  catalog-service:
    build: ./services/catalog-service
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@catalog-db:5432/catalog_db
    depends_on:
      catalog-db:
        condition: service_healthy
    networks:
      - swasthkart-net

  inventory-service:
    build: ./services/inventory-service
    ports:
      - "3003:3003"
      - "50051:50051"
    environment:
      SERVER_PORT: 3003
      SPRING_DATASOURCE_URL: jdbc:postgresql://inventory-db:5432/inventory_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      GRPC_SERVER_PORT: 50051
    depends_on:
      inventory-db:
        condition: service_healthy
    networks:
      - swasthkart-net

  cart-service:
    build: ./services/cart-service
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      DATABASE_URL: postgresql://postgres:postgres@cart-db:5432/cart_db
      REDIS_URL: redis://redis:6379
      CATALOG_SERVICE_URL: http://catalog-service:3002
      INVENTORY_SERVICE_URL: http://inventory-service:3003
      INVENTORY_GRPC_HOST: inventory-service
      INVENTORY_GRPC_PORT: 50051
      NODE_ENV: development
    depends_on:
      cart-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      catalog-service:
        condition: service_started
      inventory-service:
        condition: service_started
    networks:
      - swasthkart-net

  payment-service:
    build: ./services/payment-service
    ports:
      - "3005:3005"
    environment:
      PORT: 3005
      DATABASE_URL: postgresql://postgres:postgres@payment-db:5432/payment_db
      KAFKA_BROKERS: kafka:29092
      BFF_BASE_URL: http://localhost:3000
      NODE_ENV: development
    depends_on:
      payment-db:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - swasthkart-net

  order-service:
    build: ./services/order-service
    ports:
      - "3006:3006"
    environment:
      PORT: 3006
      DATABASE_URL: postgresql://postgres:postgres@order-db:5432/order_db
      KAFKA_BROKERS: kafka:29092
      INVENTORY_SERVICE_URL: http://inventory-service:3003
      CART_SERVICE_URL: http://cart-service:3004
      IDENTITY_SERVICE_URL: http://identity-service:3001
      NODE_ENV: development
    depends_on:
      order-db:
        condition: service_healthy
      kafka:
        condition: service_started
      inventory-service:
        condition: service_started
      cart-service:
        condition: service_started
    networks:
      - swasthkart-net

  delivery-service:
    build: ./services/delivery-service
    ports:
      - "3007:3007"
    environment:
      PORT: 3007
      DATABASE_URL: postgresql://postgres:postgres@delivery-db:5432/delivery_db
      KAFKA_BROKERS: kafka:29092
      NODE_ENV: development
    depends_on:
      delivery-db:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - swasthkart-net

  bff-gateway:
    build: ./services/bff-gateway
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      JWT_SECRET: dev-jwt-secret-change-in-production
      IDENTITY_SERVICE_URL: http://identity-service:3001
      CATALOG_SERVICE_URL: http://catalog-service:3002
      INVENTORY_SERVICE_URL: http://inventory-service:3003
      CART_SERVICE_URL: http://cart-service:3004
      PAYMENT_SERVICE_URL: http://payment-service:3005
      ORDER_SERVICE_URL: http://order-service:3006
      DELIVERY_SERVICE_URL: http://delivery-service:3007
      COOKIE_DOMAIN: localhost
      NODE_ENV: development
    depends_on:
      - identity-service
      - catalog-service
      - inventory-service
      - cart-service
      - payment-service
      - order-service
      - delivery-service
    networks:
      - swasthkart-net
