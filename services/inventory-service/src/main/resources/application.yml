server:
  port: ${PORT:8082}

spring:
  application:
    name: inventory-service

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/inventory}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

inventory:
  reservation:
    ttlSeconds: ${RESERVATION_TTL_SECONDS:600}  # 10 minutes