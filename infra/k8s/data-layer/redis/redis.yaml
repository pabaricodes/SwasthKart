apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: sk-dev-data
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/instance: redis-dev
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: swasthkart
    app.kubernetes.io/managed-by: kubectl
    swasthkart.io/team: platform
    swasthkart.io/tier: data
  annotations:
    swasthkart.io/owner: "manan.pabari"
    swasthkart.io/repo: "services/redis"
    swasthkart.io/port: "6379"
    swasthkart.io/dependencies: ""
    swasthkart.io/health-live: "/health/live"
    swasthkart.io/health-ready: "/health/ready"
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
      app.kubernetes.io/instance: redis-dev
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/instance: redis-dev
        app.kubernetes.io/version: "1.0.0"
        app.kubernetes.io/component: cache
        app.kubernetes.io/part-of: swasthkart
        app.kubernetes.io/managed-by: kubectl
        swasthkart.io/team: platform
        swasthkart.io/tier: data
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: gp3
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: sk-dev-data
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/instance: redis-dev
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: swasthkart
    app.kubernetes.io/managed-by: kubectl
    swasthkart.io/team: platform
    swasthkart.io/tier: data
spec:
  selector:
    app.kubernetes.io/name: redis
    app.kubernetes.io/instance: redis-dev
  ports:
    - port: 6379
      targetPort: 6379
