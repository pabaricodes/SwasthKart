apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: identity-db
  namespace: sk-dev-data
  labels:
    app.kubernetes.io/name: identity-db
    app.kubernetes.io/instance: identity-db-dev
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: swasthkart
    app.kubernetes.io/managed-by: kubectl
    swasthkart.io/team: platform
    swasthkart.io/tier: data
  annotations:
    swasthkart.io/owner: "manan.pabari"
    swasthkart.io/repo: "services/identity-service"
    swasthkart.io/port: "5432"
    swasthkart.io/dependencies: ""
    swasthkart.io/health-live: "/health/live"
    swasthkart.io/health-ready: "/health/ready"
spec:
  serviceName: identity-db
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: identity-db
      app.kubernetes.io/instance: identity-db-dev
  template:
    metadata:
      labels:
        app.kubernetes.io/name: identity-db
        app.kubernetes.io/instance: identity-db-dev
        app.kubernetes.io/version: "1.0.0"
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: swasthkart
        app.kubernetes.io/managed-by: kubectl
        swasthkart.io/team: platform
        swasthkart.io/tier: data
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: identity_db
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: identity-db-credentials
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: identity-db-credentials
                  key: password
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: gp3
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: identity-db
  namespace: sk-dev-data
  labels:
    app.kubernetes.io/name: identity-db
    app.kubernetes.io/instance: identity-db-dev
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: swasthkart
    app.kubernetes.io/managed-by: kubectl
    swasthkart.io/team: platform
    swasthkart.io/tier: data
spec:
  selector:
    app.kubernetes.io/name: identity-db
    app.kubernetes.io/instance: identity-db-dev
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
