apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: sk-dev-data
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/instance: kafka-dev
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: broker
    app.kubernetes.io/part-of: swasthkart
    app.kubernetes.io/managed-by: kubectl
    swasthkart.io/team: platform
    swasthkart.io/tier: data
  annotations:
    swasthkart.io/owner: "manan.pabari"
    swasthkart.io/repo: "services/kafka"
    swasthkart.io/port: "9092"
    swasthkart.io/dependencies: "zookeeper"
    swasthkart.io/health-live: "/health/live"
    swasthkart.io/health-ready: "/health/ready"
spec:
  serviceName: kafka
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: kafka
      app.kubernetes.io/instance: kafka-dev
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka
        app.kubernetes.io/instance: kafka-dev
        app.kubernetes.io/version: "1.0.0"
        app.kubernetes.io/component: broker
        app.kubernetes.io/part-of: swasthkart
        app.kubernetes.io/managed-by: kubectl
        swasthkart.io/team: platform
        swasthkart.io/tier: data
    spec:
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.5.3
          ports:
            - containerPort: 9092
              name: client
            - containerPort: 9093
              name: internal
          env:
            - name: KAFKA_BROKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: "zookeeper:2181"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "INTERNAL:PLAINTEXT,CLIENT:PLAINTEXT"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "INTERNAL"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "3"
            - name: KAFKA_DEFAULT_REPLICATION_FACTOR
              value: "3"
            - name: KAFKA_MIN_INSYNC_REPLICAS
              value: "2"
            - name: KAFKA_LOG_RETENTION_HOURS
              value: "168"
          volumeMounts:
            - name: data
              mountPath: /var/lib/kafka/data
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 1000m
              memory: 2Gi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: gp3
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: sk-dev-data
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/instance: kafka-dev
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: broker
    app.kubernetes.io/part-of: swasthkart
    app.kubernetes.io/managed-by: kubectl
    swasthkart.io/team: platform
    swasthkart.io/tier: data
spec:
  selector:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/instance: kafka-dev
  ports:
    - port: 9092
      targetPort: 9092
      name: client
  clusterIP: None
