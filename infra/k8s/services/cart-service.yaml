apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
  namespace: swasthkart
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cart-service
  template:
    metadata:
      labels:
        app: cart-service
    spec:
      serviceAccountName: cart-service
      containers:
        - name: cart-service
          image: ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/swasthkart/cart-service:latest
          ports:
            - containerPort: 3004
          env:
            - name: PORT
              value: "3004"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cart-service-secrets
                  key: database-url
            - name: INVENTORY_GRPC_HOST
              value: "inventory-service"
            - name: INVENTORY_GRPC_PORT
              value: "50051"
            - name: CATALOG_SERVICE_URL
              value: "http://catalog-service:3002"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3004
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3004
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: cart-service
  namespace: swasthkart
spec:
  selector:
    app: cart-service
  ports:
    - port: 3004
      targetPort: 3004
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cart-service
  namespace: swasthkart
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cart-service
  namespace: swasthkart
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cart-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
