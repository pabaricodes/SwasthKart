apiVersion: apps/v1
kind: Deployment
metadata:
  name: bff-gateway
  namespace: sk-dev
  labels:
    app.kubernetes.io/name: bff-gateway
    app.kubernetes.io/instance: bff-gateway-dev
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: swasthkart
    app.kubernetes.io/managed-by: kubectl
    swasthkart.io/team: platform
    swasthkart.io/tier: edge
    swasthkart.io/language: typescript
  annotations:
    swasthkart.io/owner: "manan.pabari"
    swasthkart.io/repo: "services/bff-gateway"
    swasthkart.io/port: "3000"
    swasthkart.io/dependencies: "identity-svc,catalog-svc,inventory-svc,cart-svc,payment-svc,order-svc,delivery-svc"
    swasthkart.io/health-live: "/health/live"
    swasthkart.io/health-ready: "/health/ready"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: bff-gateway
      app.kubernetes.io/instance: bff-gateway-dev
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bff-gateway
        app.kubernetes.io/instance: bff-gateway-dev
        app.kubernetes.io/version: "1.0.0"
        app.kubernetes.io/component: gateway
        app.kubernetes.io/part-of: swasthkart
        app.kubernetes.io/managed-by: kubectl
        swasthkart.io/team: platform
        swasthkart.io/tier: edge
        swasthkart.io/language: typescript
    spec:
      serviceAccountName: bff-gateway
      containers:
        - name: bff-gateway
          image: ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/swasthkart/bff-gateway:1.0.0
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: bff-gateway-credentials
                  key: jwt-secret
            - name: IDENTITY_SERVICE_URL
              value: "http://identity-svc:3001"
            - name: CATALOG_SERVICE_URL
              value: "http://catalog-svc:3002"
            - name: INVENTORY_SERVICE_URL
              value: "http://inventory-svc:3003"
            - name: CART_SERVICE_URL
              value: "http://cart-svc:3004"
            - name: PAYMENT_SERVICE_URL
              value: "http://payment-svc:3005"
            - name: ORDER_SERVICE_URL
              value: "http://order-svc:3006"
            - name: DELIVERY_SERVICE_URL
              value: "http://delivery-svc:3007"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: bff-gateway
  namespace: sk-dev
  labels:
    app.kubernetes.io/name: bff-gateway
    app.kubernetes.io/instance: bff-gateway-dev
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: swasthkart
    app.kubernetes.io/managed-by: kubectl
    swasthkart.io/team: platform
    swasthkart.io/tier: edge
    swasthkart.io/language: typescript
spec:
  selector:
    app.kubernetes.io/name: bff-gateway
    app.kubernetes.io/instance: bff-gateway-dev
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bff-gateway
  namespace: sk-dev
  labels:
    app.kubernetes.io/name: bff-gateway
    app.kubernetes.io/instance: bff-gateway-dev
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: swasthkart
    app.kubernetes.io/managed-by: kubectl
    swasthkart.io/team: platform
    swasthkart.io/tier: edge
    swasthkart.io/language: typescript
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bff-gateway
  namespace: sk-dev
  labels:
    app.kubernetes.io/name: bff-gateway
    app.kubernetes.io/instance: bff-gateway-dev
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: swasthkart
    app.kubernetes.io/managed-by: kubectl
    swasthkart.io/team: platform
    swasthkart.io/tier: edge
    swasthkart.io/language: typescript
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bff-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
