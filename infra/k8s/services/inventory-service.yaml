apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: swasthkart
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      serviceAccountName: inventory-service
      containers:
        - name: inventory-service
          image: ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/swasthkart/inventory-service:latest
          ports:
            - containerPort: 3003
              name: http
            - containerPort: 50051
              name: grpc
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: inventory-service-secrets
                  key: database-url
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3003
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: swasthkart
spec:
  selector:
    app: inventory-service
  ports:
    - name: http
      port: 3003
      targetPort: 3003
    - name: grpc
      port: 50051
      targetPort: 50051
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: inventory-service
  namespace: swasthkart
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: inventory-service
  namespace: swasthkart
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: inventory-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
