apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-svc
  namespace: sk-dev
  labels:
    app.kubernetes.io/name: inventory-svc
    app.kubernetes.io/instance: inventory-svc-dev
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: swasthkart
    app.kubernetes.io/managed-by: kubectl
    swasthkart.io/team: platform
    swasthkart.io/tier: backend
    swasthkart.io/language: java
  annotations:
    swasthkart.io/owner: "manan.pabari"
    swasthkart.io/repo: "services/inventory-service"
    swasthkart.io/port: "3003"
    swasthkart.io/dependencies: "inventory-db"
    swasthkart.io/health-live: "/health/live"
    swasthkart.io/health-ready: "/health/ready"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: inventory-svc
      app.kubernetes.io/instance: inventory-svc-dev
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inventory-svc
        app.kubernetes.io/instance: inventory-svc-dev
        app.kubernetes.io/version: "1.0.0"
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: swasthkart
        app.kubernetes.io/managed-by: kubectl
        swasthkart.io/team: platform
        swasthkart.io/tier: backend
        swasthkart.io/language: java
    spec:
      serviceAccountName: inventory-svc
      containers:
        - name: inventory-svc
          image: ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/swasthkart/inventory-service:1.0.0
          ports:
            - containerPort: 3003
              name: http
            - containerPort: 50051
              name: grpc
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: inventory-svc-credentials
                  key: database-url
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3003
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-svc
  namespace: sk-dev
  labels:
    app.kubernetes.io/name: inventory-svc
    app.kubernetes.io/instance: inventory-svc-dev
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: swasthkart
    app.kubernetes.io/managed-by: kubectl
    swasthkart.io/team: platform
    swasthkart.io/tier: backend
    swasthkart.io/language: java
spec:
  selector:
    app.kubernetes.io/name: inventory-svc
    app.kubernetes.io/instance: inventory-svc-dev
  ports:
    - name: http
      port: 3003
      targetPort: 3003
    - name: grpc
      port: 50051
      targetPort: 50051
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: inventory-svc
  namespace: sk-dev
  labels:
    app.kubernetes.io/name: inventory-svc
    app.kubernetes.io/instance: inventory-svc-dev
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: swasthkart
    app.kubernetes.io/managed-by: kubectl
    swasthkart.io/team: platform
    swasthkart.io/tier: backend
    swasthkart.io/language: java
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: inventory-svc
  namespace: sk-dev
  labels:
    app.kubernetes.io/name: inventory-svc
    app.kubernetes.io/instance: inventory-svc-dev
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: swasthkart
    app.kubernetes.io/managed-by: kubectl
    swasthkart.io/team: platform
    swasthkart.io/tier: backend
    swasthkart.io/language: java
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: inventory-svc
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
