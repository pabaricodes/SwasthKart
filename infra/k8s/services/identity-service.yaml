apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-svc
  namespace: sk-dev
  labels:
    app.kubernetes.io/name: identity-svc
    app.kubernetes.io/instance: identity-svc-dev
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: swasthkart
    app.kubernetes.io/managed-by: kubectl
    swasthkart.io/team: platform
    swasthkart.io/tier: backend
    swasthkart.io/language: typescript
  annotations:
    swasthkart.io/owner: "manan.pabari"
    swasthkart.io/repo: "services/identity-service"
    swasthkart.io/port: "3001"
    swasthkart.io/dependencies: "identity-db"
    swasthkart.io/health-live: "/health/live"
    swasthkart.io/health-ready: "/health/ready"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: identity-svc
      app.kubernetes.io/instance: identity-svc-dev
  template:
    metadata:
      labels:
        app.kubernetes.io/name: identity-svc
        app.kubernetes.io/instance: identity-svc-dev
        app.kubernetes.io/version: "1.0.0"
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: swasthkart
        app.kubernetes.io/managed-by: kubectl
        swasthkart.io/team: platform
        swasthkart.io/tier: backend
        swasthkart.io/language: typescript
    spec:
      serviceAccountName: identity-svc
      containers:
        - name: identity-svc
          image: ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/swasthkart/identity-service:1.0.0
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: identity-svc-credentials
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: identity-svc-credentials
                  key: jwt-secret
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: identity-svc
  namespace: sk-dev
  labels:
    app.kubernetes.io/name: identity-svc
    app.kubernetes.io/instance: identity-svc-dev
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: swasthkart
    app.kubernetes.io/managed-by: kubectl
    swasthkart.io/team: platform
    swasthkart.io/tier: backend
    swasthkart.io/language: typescript
spec:
  selector:
    app.kubernetes.io/name: identity-svc
    app.kubernetes.io/instance: identity-svc-dev
  ports:
    - port: 3001
      targetPort: 3001
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: identity-svc
  namespace: sk-dev
  labels:
    app.kubernetes.io/name: identity-svc
    app.kubernetes.io/instance: identity-svc-dev
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: swasthkart
    app.kubernetes.io/managed-by: kubectl
    swasthkart.io/team: platform
    swasthkart.io/tier: backend
    swasthkart.io/language: typescript
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: identity-svc
  namespace: sk-dev
  labels:
    app.kubernetes.io/name: identity-svc
    app.kubernetes.io/instance: identity-svc-dev
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: swasthkart
    app.kubernetes.io/managed-by: kubectl
    swasthkart.io/team: platform
    swasthkart.io/tier: backend
    swasthkart.io/language: typescript
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: identity-svc
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
