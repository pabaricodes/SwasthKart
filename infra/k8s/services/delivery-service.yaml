apiVersion: apps/v1
kind: Deployment
metadata:
  name: delivery-svc
  namespace: sk-dev
  labels:
    app.kubernetes.io/name: delivery-svc
    app.kubernetes.io/instance: delivery-svc-dev
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: swasthkart
    app.kubernetes.io/managed-by: kubectl
    swasthkart.io/team: platform
    swasthkart.io/tier: backend
    swasthkart.io/language: typescript
  annotations:
    swasthkart.io/owner: "manan.pabari"
    swasthkart.io/repo: "services/delivery-service"
    swasthkart.io/port: "3007"
    swasthkart.io/dependencies: "delivery-db,kafka"
    swasthkart.io/health-live: "/health/live"
    swasthkart.io/health-ready: "/health/ready"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: delivery-svc
      app.kubernetes.io/instance: delivery-svc-dev
  template:
    metadata:
      labels:
        app.kubernetes.io/name: delivery-svc
        app.kubernetes.io/instance: delivery-svc-dev
        app.kubernetes.io/version: "1.0.0"
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: swasthkart
        app.kubernetes.io/managed-by: kubectl
        swasthkart.io/team: platform
        swasthkart.io/tier: backend
        swasthkart.io/language: typescript
    spec:
      serviceAccountName: delivery-svc
      containers:
        - name: delivery-svc
          image: ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/swasthkart/delivery-service:1.0.0
          ports:
            - containerPort: 3007
          env:
            - name: PORT
              value: "3007"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: delivery-svc-credentials
                  key: database-url
            - name: KAFKA_BROKERS
              value: "kafka-0.kafka.sk-dev-data:9092,kafka-1.kafka.sk-dev-data:9092,kafka-2.kafka.sk-dev-data:9092"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3007
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3007
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: delivery-svc
  namespace: sk-dev
  labels:
    app.kubernetes.io/name: delivery-svc
    app.kubernetes.io/instance: delivery-svc-dev
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: swasthkart
    app.kubernetes.io/managed-by: kubectl
    swasthkart.io/team: platform
    swasthkart.io/tier: backend
    swasthkart.io/language: typescript
spec:
  selector:
    app.kubernetes.io/name: delivery-svc
    app.kubernetes.io/instance: delivery-svc-dev
  ports:
    - port: 3007
      targetPort: 3007
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: delivery-svc
  namespace: sk-dev
  labels:
    app.kubernetes.io/name: delivery-svc
    app.kubernetes.io/instance: delivery-svc-dev
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: swasthkart
    app.kubernetes.io/managed-by: kubectl
    swasthkart.io/team: platform
    swasthkart.io/tier: backend
    swasthkart.io/language: typescript
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: delivery-svc
  namespace: sk-dev
  labels:
    app.kubernetes.io/name: delivery-svc
    app.kubernetes.io/instance: delivery-svc-dev
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: swasthkart
    app.kubernetes.io/managed-by: kubectl
    swasthkart.io/team: platform
    swasthkart.io/tier: backend
    swasthkart.io/language: typescript
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: delivery-svc
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
