apiVersion: apps/v1
kind: Deployment
metadata:
  name: delivery-service
  namespace: swasthkart
spec:
  replicas: 2
  selector:
    matchLabels:
      app: delivery-service
  template:
    metadata:
      labels:
        app: delivery-service
    spec:
      serviceAccountName: delivery-service
      containers:
        - name: delivery-service
          image: ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/swasthkart/delivery-service:latest
          ports:
            - containerPort: 3007
          env:
            - name: PORT
              value: "3007"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: delivery-service-secrets
                  key: database-url
            - name: KAFKA_BROKERS
              value: "kafka-0.kafka.swasthkart-data:9092,kafka-1.kafka.swasthkart-data:9092,kafka-2.kafka.swasthkart-data:9092"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3007
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3007
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: delivery-service
  namespace: swasthkart
spec:
  selector:
    app: delivery-service
  ports:
    - port: 3007
      targetPort: 3007
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: delivery-service
  namespace: swasthkart
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: delivery-service
  namespace: swasthkart
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: delivery-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
