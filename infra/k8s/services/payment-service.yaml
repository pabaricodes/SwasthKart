apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: swasthkart
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      serviceAccountName: payment-service
      containers:
        - name: payment-service
          image: ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/swasthkart/payment-service:latest
          ports:
            - containerPort: 3005
          env:
            - name: PORT
              value: "3005"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: payment-service-secrets
                  key: database-url
            - name: KAFKA_BROKERS
              value: "kafka-0.kafka.swasthkart-data:9092,kafka-1.kafka.swasthkart-data:9092,kafka-2.kafka.swasthkart-data:9092"
            - name: BFF_BASE_URL
              value: "http://bff-gateway:3000"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3005
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3005
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: swasthkart
spec:
  selector:
    app: payment-service
  ports:
    - port: 3005
      targetPort: 3005
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: payment-service
  namespace: swasthkart
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: payment-service
  namespace: swasthkart
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: payment-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
