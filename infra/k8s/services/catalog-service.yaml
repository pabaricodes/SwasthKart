apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-svc
  namespace: sk-dev
  labels:
    app.kubernetes.io/name: catalog-svc
    app.kubernetes.io/instance: catalog-svc-dev
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: swasthkart
    app.kubernetes.io/managed-by: kubectl
    swasthkart.io/team: platform
    swasthkart.io/tier: backend
    swasthkart.io/language: python
  annotations:
    swasthkart.io/owner: "manan.pabari"
    swasthkart.io/repo: "services/catalog-service"
    swasthkart.io/port: "3002"
    swasthkart.io/dependencies: "catalog-db"
    swasthkart.io/health-live: "/health/live"
    swasthkart.io/health-ready: "/health/ready"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: catalog-svc
      app.kubernetes.io/instance: catalog-svc-dev
  template:
    metadata:
      labels:
        app.kubernetes.io/name: catalog-svc
        app.kubernetes.io/instance: catalog-svc-dev
        app.kubernetes.io/version: "1.0.0"
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: swasthkart
        app.kubernetes.io/managed-by: kubectl
        swasthkart.io/team: platform
        swasthkart.io/tier: backend
        swasthkart.io/language: python
    spec:
      serviceAccountName: catalog-svc
      containers:
        - name: catalog-svc
          image: ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/swasthkart/catalog-service:1.0.0
          ports:
            - containerPort: 3002
          env:
            - name: PORT
              value: "3002"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: catalog-svc-credentials
                  key: database-url
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-svc
  namespace: sk-dev
  labels:
    app.kubernetes.io/name: catalog-svc
    app.kubernetes.io/instance: catalog-svc-dev
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: swasthkart
    app.kubernetes.io/managed-by: kubectl
    swasthkart.io/team: platform
    swasthkart.io/tier: backend
    swasthkart.io/language: python
spec:
  selector:
    app.kubernetes.io/name: catalog-svc
    app.kubernetes.io/instance: catalog-svc-dev
  ports:
    - port: 3002
      targetPort: 3002
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: catalog-svc
  namespace: sk-dev
  labels:
    app.kubernetes.io/name: catalog-svc
    app.kubernetes.io/instance: catalog-svc-dev
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: swasthkart
    app.kubernetes.io/managed-by: kubectl
    swasthkart.io/team: platform
    swasthkart.io/tier: backend
    swasthkart.io/language: python
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: catalog-svc
  namespace: sk-dev
  labels:
    app.kubernetes.io/name: catalog-svc
    app.kubernetes.io/instance: catalog-svc-dev
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: swasthkart
    app.kubernetes.io/managed-by: kubectl
    swasthkart.io/team: platform
    swasthkart.io/tier: backend
    swasthkart.io/language: python
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: catalog-svc
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
