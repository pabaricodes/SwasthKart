openapi: 3.0.3
info:
  title: SwasthKart Order Service
  version: 1.0.0
  description: Order management — created from PaymentSucceeded events

servers:
  - url: http://localhost:3006

paths:
  /v1/orders:
    get:
      operationId: listOrders
      tags: [Orders]
      summary: List current user's orders
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            type: string
            enum: [PLACED, CONFIRMED, DISPATCHED, DELIVERED, CANCELLED]
      responses:
        "200":
          description: Paginated orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedOrders"

  /v1/orders/{id}:
    get:
      operationId: getOrder
      tags: [Orders]
      summary: Get order details with items
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Order detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/admin/orders:
    get:
      operationId: adminListOrders
      tags: [Admin]
      summary: List all orders (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            type: string
            enum: [PLACED, CONFIRMED, DISPATCHED, DELIVERED, CANCELLED]
        - name: user_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Paginated orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedOrders"

  /v1/admin/orders/{id}/status:
    patch:
      operationId: updateOrderStatus
      tags: [Admin]
      summary: Update order status
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [CONFIRMED, DISPATCHED, DELIVERED, CANCELLED]
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /health/live:
    get:
      tags: [Health]
      responses:
        "200":
          description: Alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /health/ready:
    get:
      tags: [Health]
      responses:
        "200":
          description: Ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ready
                  checks:
                    type: object
                    properties:
                      db:
                        type: string
                        example: ok

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Order:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        payment_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [PLACED, CONFIRMED, DISPATCHED, DELIVERED, CANCELLED]
        total_paise:
          type: integer
        shipping_address:
          $ref: "#/components/schemas/ShippingAddress"
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        placed_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    OrderSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [PLACED, CONFIRMED, DISPATCHED, DELIVERED, CANCELLED]
        total_paise:
          type: integer
        item_count:
          type: integer
        placed_at:
          type: string
          format: date-time

    OrderItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        product_id:
          type: string
          format: uuid
        sku:
          type: string
        product_name:
          type: string
        quantity:
          type: integer
        unit_price_paise:
          type: integer
        subtotal_paise:
          type: integer

    ShippingAddress:
      type: object
      properties:
        label:
          type: string
        line1:
          type: string
        line2:
          type: string
          nullable: true
        city:
          type: string
        state:
          type: string
        pincode:
          type: string

    PaginatedOrders:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/OrderSummary"
        pagination:
          type: object
          properties:
            page:
              type: integer
            page_size:
              type: integer
            total_count:
              type: integer
            total_pages:
              type: integer

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object

  responses:
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
