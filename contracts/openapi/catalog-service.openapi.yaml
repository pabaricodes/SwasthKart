openapi: 3.0.3
info:
  title: SwasthKart Catalog Service
  version: 1.0.0
  description: Product catalog and category management

servers:
  - url: http://localhost:3002

paths:
  /v1/categories:
    get:
      operationId: listCategories
      tags: [Categories]
      summary: List all active categories
      responses:
        "200":
          description: Category list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /v1/categories/{slug}:
    get:
      operationId: getCategoryBySlug
      tags: [Categories]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Category detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/products:
    get:
      operationId: listProducts
      tags: [Products]
      summary: List products with pagination and filters
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: category_id
          in: query
          schema:
            type: string
            format: uuid
        - name: search
          in: query
          schema:
            type: string
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [name, price, created_at]
            default: created_at
        - name: sort_order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        "200":
          description: Paginated product list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedProducts"

  /v1/products/{id}:
    get:
      operationId: getProductById
      tags: [Products]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Full product detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/admin/categories:
    post:
      operationId: createCategory
      tags: [Admin - Categories]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Category created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /v1/admin/categories/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    put:
      operationId: updateCategory
      tags: [Admin - Categories]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "200":
          description: Updated category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [Admin - Categories]
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Category deleted

  /v1/admin/products:
    post:
      operationId: createProduct
      tags: [Admin - Products]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /v1/admin/products/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    put:
      operationId: updateProduct
      tags: [Admin - Products]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [Admin - Products]
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Product deleted

  /health/live:
    get:
      operationId: healthLive
      tags: [Health]
      responses:
        "200":
          description: Alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /health/ready:
    get:
      operationId: healthReady
      tags: [Health]
      responses:
        "200":
          description: Ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ready
                  checks:
                    type: object
                    properties:
                      db:
                        type: string
                        example: ok

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        image_url:
          type: string
          nullable: true
        sort_order:
          type: integer
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time

    CategoryInput:
      type: object
      required: [name, slug]
      properties:
        name:
          type: string
          maxLength: 100
        slug:
          type: string
          maxLength: 100
        image_url:
          type: string
          maxLength: 500
        sort_order:
          type: integer
          default: 0

    Product:
      type: object
      properties:
        id:
          type: string
          format: uuid
        category_id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        brand:
          type: string
        image_urls:
          type: array
          items:
            type: string
        mrp_paise:
          type: integer
        selling_price_paise:
          type: integer
        unit:
          type: string
          enum: [g, kg, ml, l, pieces]
        unit_value:
          type: number
        nutrition_info:
          $ref: "#/components/schemas/NutritionInfo"
        allergens:
          type: array
          items:
            type: string
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ProductInput:
      type: object
      required: [category_id, name, slug, mrp_paise, selling_price_paise, unit, unit_value]
      properties:
        category_id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 200
        slug:
          type: string
          maxLength: 200
        description:
          type: string
        brand:
          type: string
          maxLength: 100
        image_urls:
          type: array
          items:
            type: string
        mrp_paise:
          type: integer
          minimum: 0
        selling_price_paise:
          type: integer
          minimum: 0
        unit:
          type: string
          enum: [g, kg, ml, l, pieces]
        unit_value:
          type: number
        nutrition_info:
          $ref: "#/components/schemas/NutritionInfo"
        allergens:
          type: array
          items:
            type: string

    NutritionInfo:
      type: object
      properties:
        calories:
          type: number
        protein_g:
          type: number
        carbs_g:
          type: number
        fat_g:
          type: number
        fiber_g:
          type: number
        serving_size:
          type: number
        serving_unit:
          type: string

    PaginatedProducts:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        pagination:
          $ref: "#/components/schemas/Pagination"

    Pagination:
      type: object
      properties:
        page:
          type: integer
        page_size:
          type: integer
        total_count:
          type: integer
        total_pages:
          type: integer

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
