openapi: 3.0.3
info:
  title: SwasthKart Identity Service
  version: 1.0.0
  description: OTP authentication, user profiles, and address management

servers:
  - url: http://localhost:3001
    description: Local development

paths:
  /v1/otp/send:
    post:
      operationId: sendOtp
      tags: [Auth]
      summary: Send OTP to phone number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone]
              properties:
                phone:
                  type: string
                  pattern: '^\d{10}$'
                  example: "9876543210"
      responses:
        "200":
          description: OTP sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: OTP sent
                  expires_in:
                    type: integer
                    example: 300
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/otp/verify:
    post:
      operationId: verifyOtp
      tags: [Auth]
      summary: Verify OTP and issue JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, otp]
              properties:
                phone:
                  type: string
                  pattern: '^\d{10}$'
                otp:
                  type: string
                  pattern: '^\d{6}$'
      responses:
        "200":
          description: Verification successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: string
                    format: uuid
                  token:
                    type: string
                    description: JWT token
                  is_new_user:
                    type: boolean
        "401":
          description: Invalid or expired OTP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/users/me:
    get:
      operationId: getProfile
      tags: [Profile]
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      operationId: updateProfile
      tags: [Profile]
      summary: Update user profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 100
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /v1/users/me/addresses:
    get:
      operationId: listAddresses
      tags: [Addresses]
      summary: List user addresses
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Address list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Address"
    post:
      operationId: createAddress
      tags: [Addresses]
      summary: Add a new address
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddressInput"
      responses:
        "201":
          description: Address created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Address"

  /v1/users/me/addresses/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    put:
      operationId: updateAddress
      tags: [Addresses]
      summary: Update an address
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddressInput"
      responses:
        "200":
          description: Updated address
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Address"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteAddress
      tags: [Addresses]
      summary: Delete an address
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Address deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/users/me/addresses/{id}/default:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    put:
      operationId: setDefaultAddress
      tags: [Addresses]
      summary: Set address as default
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Address set as default
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Address"

  /health/live:
    get:
      operationId: healthLive
      tags: [Health]
      responses:
        "200":
          description: Service is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /health/ready:
    get:
      operationId: healthReady
      tags: [Health]
      responses:
        "200":
          description: Service is ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ready
                  checks:
                    type: object
                    properties:
                      db:
                        type: string
                        example: ok

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        phone_masked:
          type: string
          example: "****543210"
        name:
          type: string
        role:
          type: string
          enum: [CUSTOMER, ADMIN]
        created_at:
          type: string
          format: date-time

    Address:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        label:
          type: string
          example: Home
        line1:
          type: string
        line2:
          type: string
          nullable: true
        city:
          type: string
        state:
          type: string
        pincode:
          type: string
          pattern: '^\d{6}$'
        is_default:
          type: boolean
        created_at:
          type: string
          format: date-time

    AddressInput:
      type: object
      required: [label, line1, city, state, pincode]
      properties:
        label:
          type: string
          maxLength: 50
        line1:
          type: string
          maxLength: 200
        line2:
          type: string
          maxLength: 200
        city:
          type: string
          maxLength: 100
        state:
          type: string
          maxLength: 100
        pincode:
          type: string
          pattern: '^\d{6}$'

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object

  responses:
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
