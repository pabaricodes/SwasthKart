openapi: 3.0.3
info:
  title: SwasthKart Admin Service
  description: |
    Internal admin service for dashboard, inventory management, and delivery tracking.
    All endpoints require admin role authentication.

    This service also proxies catalog admin endpoints (POST/PUT/DELETE categories and products)
    and order admin endpoints (GET orders, PATCH status) — see catalog-service and order-service contracts.
  version: 1.0.0
  contact:
    name: SwasthKart Engineering

servers:
  - url: http://localhost:8085
    description: Local development

tags:
  - name: Health
    description: Health check endpoints
  - name: Dashboard
    description: Admin dashboard metrics
  - name: Inventory
    description: Inventory management
  - name: Deliveries
    description: Delivery tracking and management

security:
  - BearerAuth: []

paths:
  /health/live:
    get:
      tags: [Health]
      summary: Liveness probe
      operationId: getLiveness
      security: []
      responses:
        "200":
          description: Service is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: UP

  /health/ready:
    get:
      tags: [Health]
      summary: Readiness probe
      operationId: getReadiness
      security: []
      responses:
        "200":
          description: Service is ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: UP
        "503":
          description: Service is not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/dashboard:
    get:
      tags: [Dashboard]
      summary: Get admin dashboard metrics
      operationId: getDashboard
      responses:
        "200":
          description: Dashboard metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /v1/admin/inventory:
    get:
      tags: [Inventory]
      summary: List inventory items (paginated)
      operationId: listInventory
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Paginated inventory items
          content:
            application/json:
              schema:
                type: object
                required: [data, pagination]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/InventoryItem"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /v1/admin/inventory/{sku}:
    put:
      tags: [Inventory]
      summary: Update inventory quantity for a SKU
      operationId: updateInventory
      parameters:
        - name: sku
          in: path
          required: true
          schema:
            type: string
          description: Stock Keeping Unit identifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [total_qty]
              properties:
                total_qty:
                  type: integer
                  minimum: 0
                  description: New total quantity
                  example: 500
      responses:
        "200":
          description: Updated inventory item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /v1/admin/deliveries:
    get:
      tags: [Deliveries]
      summary: List deliveries (paginated, filterable by status)
      operationId: listDeliveries
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DeliveryStatusEnum"
          description: Filter deliveries by status
      responses:
        "200":
          description: Paginated deliveries
          content:
            application/json:
              schema:
                type: object
                required: [data, pagination]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/DeliverySummary"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /v1/admin/deliveries/{id}/status:
    patch:
      tags: [Deliveries]
      summary: Update delivery status
      operationId: updateDeliveryStatus
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Delivery ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum:
                    - ASSIGNED
                    - PICKED_UP
                    - IN_TRANSIT
                    - DELIVERED
                    - FAILED
                  description: New delivery status
                notes:
                  type: string
                  description: Optional notes for the status change
                  example: "Delivered to reception desk"
      responses:
        "200":
          description: Updated delivery
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliverySummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Admin JWT token

  parameters:
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number (1-indexed)

    PageSize:
      name: page_size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Number of items per page

  responses:
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: UNAUTHORIZED
              message: Authentication required
              details: {}

    Forbidden:
      description: Insufficient permissions — admin role required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: FORBIDDEN
              message: Admin role required
              details: {}

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: NOT_FOUND
              message: Resource not found
              details: {}

    UnprocessableEntity:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: VALIDATION_ERROR
              message: Invalid input
              details: {}

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, details]
          properties:
            code:
              type: string
              description: Machine-readable error code
              example: VALIDATION_ERROR
            message:
              type: string
              description: Human-readable error message
              example: Invalid input provided
            details:
              type: object
              additionalProperties: true
              description: Additional error context

    Pagination:
      type: object
      required: [page, page_size, total_count, total_pages]
      properties:
        page:
          type: integer
          minimum: 1
          example: 1
        page_size:
          type: integer
          minimum: 1
          example: 20
        total_count:
          type: integer
          minimum: 0
          example: 150
        total_pages:
          type: integer
          minimum: 0
          example: 8

    DashboardResponse:
      type: object
      required: [total_orders, orders_today, revenue_today_paise, pending_deliveries]
      properties:
        total_orders:
          type: integer
          description: Total number of orders across all time
          example: 12450
        orders_today:
          type: integer
          description: Number of orders placed today
          example: 37
        revenue_today_paise:
          type: integer
          description: Total revenue collected today in paise
          example: 4523500
        pending_deliveries:
          type: integer
          description: Number of deliveries not yet completed
          example: 15

    InventoryItem:
      type: object
      required: [sku, product_id, total_qty, available_qty, reserved_qty]
      properties:
        sku:
          type: string
          description: Stock Keeping Unit identifier
          example: "RICE-BAS-1KG"
        product_id:
          type: string
          format: uuid
          description: Associated product ID
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        total_qty:
          type: integer
          minimum: 0
          description: Total quantity in warehouse
          example: 500
        available_qty:
          type: integer
          minimum: 0
          description: Quantity available for sale
          example: 420
        reserved_qty:
          type: integer
          minimum: 0
          description: Quantity reserved by pending orders
          example: 80

    DeliveryStatusEnum:
      type: string
      enum:
        - PENDING
        - ASSIGNED
        - PICKED_UP
        - IN_TRANSIT
        - DELIVERED
        - FAILED

    DeliverySummary:
      type: object
      required: [id, order_id, status, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
          description: Delivery ID
          example: "d1e2f3a4-b5c6-7890-abcd-ef1234567890"
        order_id:
          type: string
          format: uuid
          description: Associated order ID
          example: "o1r2d3e4-r5i6-7890-abcd-ef1234567890"
        status:
          $ref: "#/components/schemas/DeliveryStatusEnum"
        assigned_to:
          type: string
          nullable: true
          description: Name or ID of the assigned delivery person
          example: "Ramesh Kumar"
        estimated_delivery_at:
          type: string
          format: date-time
          nullable: true
          description: Estimated delivery timestamp (ISO 8601)
          example: "2026-03-29T18:00:00Z"
        created_at:
          type: string
          format: date-time
          description: Record creation timestamp (ISO 8601)
          example: "2026-03-29T10:00:00Z"
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp (ISO 8601)
          example: "2026-03-29T14:30:00Z"
