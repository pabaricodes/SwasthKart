name: Identity Service CI

on:
  push:
    branches: [main]
    paths: ["services/identity-service/**"]
  pull_request:
    paths: ["services/identity-service/**"]

env:
  SERVICE: identity-service
  AWS_REGION: ap-south-1

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/identity-service

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: services/identity-service/package-lock.json

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx prisma generate
      - run: npm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          JWT_SECRET: test-secret-key

  build:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - name: Build and push Docker image
        working-directory: services/identity-service
        run: |
          IMAGE="${{ steps.ecr.outputs.registry }}/swasthkart/${{ env.SERVICE }}:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
