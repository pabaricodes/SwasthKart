name: Frontend CI/CD

on:
  push:
    branches: [main]
    paths: ["frontend/**"]
  pull_request:
    paths: ["frontend/**"]

env:
  AWS_REGION: ap-south-1

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build

      - name: Check bundle size
        run: |
          GZIP_SIZE=$(find dist/assets -name "*.js" -exec gzip -c {} \; | wc -c)
          echo "Total JS gzipped: ${GZIP_SIZE} bytes"
          # 250KB budget = 256000 bytes
          if [ "$GZIP_SIZE" -gt 256000 ]; then
            echo "::error::Bundle size exceeds 250KB budget"
            exit 1
          fi

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build and deploy
        working-directory: frontend
        run: |
          npm ci
          npm run build
          aws s3 sync dist/ s3://${{ secrets.FRONTEND_BUCKET }} --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" --exclude "*.json"
          aws s3 cp dist/index.html s3://${{ secrets.FRONTEND_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
